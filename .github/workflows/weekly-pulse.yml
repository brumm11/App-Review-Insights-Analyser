name: Weekly Pulse

on:
  schedule:
    - cron: "30 1 * * 1" # 07:00 IST Monday
  workflow_dispatch:

jobs:
  weekly:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        product: [groww, indmoney]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Run weekly pipeline
        env:
          PULSE_DOCS_MCP_TRANSPORT: mock
          PULSE_GMAIL_MCP_TRANSPORT: mock
          PULSE_CONFIRM_SEND: "false"
        run: pulse run --product "${{ matrix.product }}"
